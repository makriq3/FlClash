name: сборка-релиза

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  release-notes-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Проверить release notes
        run: |
          python3 .github/scripts/validate_release_notes.py \
            --tag "${{ github.ref_name }}"

  build:
    needs: [ release-notes-guard ]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
          - platform: macos
            os: macos-15-intel
            arch: amd64
          - platform: macos
            os: macos-latest
            arch: arm64
          #          - platform: windows
          #            os: windows-11-arm
          #            arch: arm64
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Определить Android NDK
        if: startsWith(matrix.platform,'android')
        run: |
          latest_ndk="$(find "${ANDROID_HOME}/ndk" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          if [ -z "${latest_ndk}" ]; then
            echo "ANDROID_NDK не найден в ${ANDROID_HOME}/ndk" >&2
            exit 1
          fi
          echo "ANDROID_NDK=${latest_ndk}" >> "${GITHUB_ENV}"

      - name: Настроить Rust
        if: startsWith(matrix.os, 'windows-11-arm')
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          $cargoPath = "$env:USERPROFILE\.cargo\bin"
          Add-Content $env:GITHUB_PATH $cargoPath

      - name: Получить код
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Настроить подпись Android
        if: startsWith(matrix.platform,'android') && env.KEYSTORE_B64 != ''
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          KEY_ALIAS_VALUE: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD_VALUE: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD_VALUE: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${KEYSTORE_B64}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${KEY_ALIAS_VALUE}" >> android/local.properties
          echo "storePassword=${STORE_PASSWORD_VALUE}" >> android/local.properties
          echo "keyPassword=${KEY_PASSWORD_VALUE}" >> android/local.properties

      - name: Проверить подпись Android для стабильного релиза
        if: startsWith(matrix.platform,'android') && env.IS_STABLE == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          KEY_ALIAS_VALUE: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD_VALUE: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD_VALUE: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "${KEYSTORE_B64}" ] || [ -z "${KEY_ALIAS_VALUE}" ] || [ -z "${STORE_PASSWORD_VALUE}" ] || [ -z "${KEY_PASSWORD_VALUE}" ]; then
            echo "Стабильные Android-релизы должны быть подписаны релизными ключами форка." >&2
            exit 1
          fi

      - name: Настроить Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Настроить Flutter
        if: ${{ !(startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')) }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true
      - name: Настроить Flutter для альтернативной среды
        if: startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: 3.35.7
          cache: true

      - name: Получить зависимости Flutter
        run: |
          flutter --version
          flutter pub get

      - name: Запустить Android-регрессионные тесты
        if: startsWith(matrix.platform,'android')
        run: flutter test test/common

      - name: Подготовить сборку
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Загрузить артефакты
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

  upload:
    permissions:
      contents: write
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Скачать артефакты
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Сформировать release notes
        run: |
          python3 .github/scripts/validate_release_notes.py \
            --tag "${{ github.ref_name }}"
          python3 .github/scripts/build_release_notes.py \
            --tag "${{ github.ref_name }}" \
            --repo-url "${{ github.server_url }}/${{ github.repository }}" \
            --output release.md \
            --summary-output release_summary.txt

      - name: Сгенерировать sha256
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done  

      - name: Опубликовать релиз
        uses: softprops/action-gh-release@v2
        with:
          name: FlClash ${{ github.ref_name }}
          prerelease: ${{ env.IS_STABLE != 'true' }}
          files: ./dist/*
          body_path: './release.md'
